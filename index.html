<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Element Randomizer — Regionals 2027</title>
<style>
  :root{
    --ink: #1a1d1a;
    --paper: #f7f5ef;
    --panel: #ffffff;
    --line: #d8d4c8;
    --moss: #2f5d3a;
    --moss-deep: #1f3f28;
    --bark: #8a6a45;
    --yellow: #e8c84a;
    --red: #c2402f;
    --green: #2f8f5b;
    --focus: #2f5d3a;
    --radius: 10px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Courier New', ui-monospace, Menlo, Consolas, monospace;
  }

  body{
    display:flex;
    flex-direction:column;
  }

  /* ---------- Top bar / tabs ---------- */
  .topbar{
    display:flex;
    align-items:flex-end;
    gap: 2px;
    padding: 18px 24px 0 24px;
    background: var(--paper);
    border-bottom: 3px solid var(--ink);
  }

  .brand{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.5px;
    margin-right: 28px;
    padding-bottom: 12px;
    white-space: nowrap;
  }
  .brand .accent{ color: var(--moss); }

  .tabs{
    display:flex;
    gap: 4px;
    flex: 1;
  }

  .tab{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 10px 18px 11px 18px;
    color: #8a8678;
    cursor: pointer;
    transition: color .15s ease;
  }
  .tab[aria-selected="true"]{
    color: var(--ink);
    border-bottom-color: var(--moss);
    font-weight: 700;
  }
  .tab:not([aria-selected="true"]):hover{ color: var(--ink); }
  .tab:disabled{
    color: #c4c0b2;
    cursor: not-allowed;
  }
  .tab:disabled:hover{ color: #c4c0b2; }
  .tab .soon{
    font-size: 9px;
    vertical-align: super;
    letter-spacing: 0;
  }

  .tab:focus-visible{
    outline: 2px solid var(--focus);
    outline-offset: -2px;
  }

  /* ---------- Layout ---------- */
  main{
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .viewport-wrap{
    flex: 1;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 20%, #eef0e6 0%, #e2e4d6 60%, #d6d8c6 100%);
    min-width: 0;
  }

  #canvas-host{
    position:absolute; inset:0;
  }

  .viewport-hint{
    position:absolute;
    bottom: 14px;
    left: 14px;
    font-size: 11px;
    color: #6b6a5e;
    background: rgba(247,245,239,0.85);
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    pointer-events: none;
  }

  .mode-badge{
    position:absolute;
    top: 14px;
    left: 14px;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    padding: 6px 12px;
    border-radius: var(--radius);
  }

  /* ---------- Side panel ---------- */
  .panel{
    width: 360px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 3px solid var(--ink);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .panel-section{
    padding: 20px 22px;
    border-bottom: 1px solid var(--line);
  }

  .panel-section h2{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 15px;
    margin: 0 0 14px 0;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .panel-section h2 .dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--moss);
    display:inline-block;
  }

  .btn-row{
    display:flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn{
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 16px 16px;
    border-radius: var(--radius);
    border: 2px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    display:flex;
    align-items:center;
    justify-content: space-between;
    transition: transform .08s ease, background .15s ease, box-shadow .15s ease;
  }
  .btn:hover{ background: #eee9da; }
  .btn:active{ transform: translateY(1px); }
  .btn:focus-visible{
    outline: 3px solid var(--focus);
    outline-offset: 2px;
  }

  .btn .arrow{ font-size: 16px; opacity: .55; }

  .btn.orientation{ border-color: var(--bark); }
  .btn.orientation:hover{ background: #f1e7d8; }
  .btn.fruit{ border-color: var(--moss); }
  .btn.fruit:hover{ background: #e7efe5; }

  .btn-sub{
    font-weight: 400;
    font-size: 11px;
    color: #6b6a5e;
    display:block;
    margin-top: 3px;
  }

  /* ---------- State readout ---------- */
  .readout{
    font-size: 12.5px;
    line-height: 1.7;
  }

  .readout-row{
    display:flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px dotted var(--line);
  }
  .readout-row:last-child{ border-bottom:none; }
  .readout-label{ color: #6b6a5e; }
  .readout-value{ font-weight: 700; }

  .tree-block{
    margin-top: 10px;
  }
  .tree-block-title{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b6a5e;
    margin-bottom: 6px;
  }

  .branch-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px;
  }

  .branch-slot{
    display:flex;
    align-items:center;
    gap: 6px;
    font-size: 11px;
    padding: 5px 7px;
    border-radius: 6px;
    background: #f1efe6;
    border: 1px solid var(--line);
  }

  .swatch{
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.25);
  }
  .swatch.empty{
    background: transparent;
    border: 1px dashed #b4b0a0;
  }
  .swatch.yellow{ background: var(--yellow); }
  .swatch.red{ background: var(--red); }
  .swatch.green{ background: var(--green); }

  .reset-link{
    margin-top: 14px;
    font-size: 11px;
    color: #8a8678;
    background:none;
    border:none;
    text-decoration: underline;
    cursor:pointer;
    padding: 0;
    font-family: inherit;
  }
  .reset-link:hover{ color: var(--ink); }
  .reset-link:focus-visible{ outline: 2px solid var(--focus); outline-offset:2px; }

  footer{
    padding: 14px 22px;
    font-size: 10.5px;
    color: #8a8678;
    text-align:center;
  }

  @media (max-width: 860px){
    main{ flex-direction: column; }
    .panel{ width: 100%; border-left:none; border-top: 3px solid var(--ink); }
    .viewport-wrap{ height: 50vh; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">ELEMENT <span class="accent">RANDOMIZER</span></div>
  <div class="tabs" role="tablist" aria-label="Challenge games">
    <button class="tab" role="tab" aria-selected="true" id="tab-TheRipeningQuest">The Ripening Quest</button>
    <button class="tab" role="tab" aria-selected="false" disabled title="Coming soon">Game 2 <span class="soon">soon</span></button>
    <button class="tab" role="tab" aria-selected="false" disabled title="Coming soon">Game 3 <span class="soon">soon</span></button>
  </div>
</div>

<main>
  <div class="viewport-wrap">
    <div class="mode-badge">Orchard — Field View</div>
    <div id="canvas-host"></div>
    <div class="viewport-hint">drag to orbit · scroll to zoom · right-drag to pan</div>
  </div>

  <aside class="panel">
    <div class="panel-section">
      <h2><span class="dot" style="background:var(--bark)"></span>Tree Orientation</h2>
      <div class="btn-row">
        <button class="btn orientation" id="btn-orientation">
          <span>Randomize Orientation<span class="btn-sub">Rotates both trees together · 0° / 90° / 180° / 270°</span></span>
          <span class="arrow">↻</span>
        </button>
      </div>
    </div>

    <div class="panel-section">
      <h2><span class="dot" style="background:var(--moss)"></span>Fruit Placement</h2>
      <div class="btn-row">
        <button class="btn fruit" id="btn-fruit">
          <span>Randomize Fruit<span class="btn-sub">≥1 red/yellow per height · green doubles one height</span></span>
          <span class="arrow">↻</span>
        </button>
      </div>
    </div>

    <div class="panel-section" style="flex:1;">
      <h2><span class="dot"></span>Current State</h2>
      <div class="readout">
        <div class="readout-row">
          <span class="readout-label">Tree angle (both trees)</span>
          <span class="readout-value" id="readout-angle">0°</span>

      </div>

      <div class="tree-block">
        <div class="tree-block-title">Branch assignment (applies to both trees)</div>

      </div>

      <button class="reset-link" id="btn-reset">Reset to default layout</button>
    </div>

    <footer>Orchard · configuration tool</footer>
  </aside>
</main>

{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   CONSTANTS / GAME MODEL
   ============================================================ */

// Mat: 5 columns x 3 rows of cells
const COLS = 5, ROWS = 3;
const CELL = 1.6; // world units per cell
const MAT_W = COLS * CELL;
const MAT_D = ROWS * CELL;

// Trees are permanently fixed to these cell coordinates (col, row), 0-indexed
// matches the reference photo: col 1 and col 3 (0-indexed), middle row
const TREE_CELLS = [
  { col: 1.25, row: 1 },
  { col: 2.75, row: 1 }
];

// 8 branches per tree: 4 heights, 2 branches per height (180 deg apart)
const BRANCH_HEIGHTS = [0.55, 0.78, 1.01, 1.24]; // world Y offsets from base top
const BRANCH_LEN = 0.42;

// fruit composition per tree
const FRUIT_POOL = ['yellow','yellow','red','red','green'];

/* ============================================================
   STATE
   ============================================================ */

const state = {
  treeAngle: 0, // shared by both trees, one of 0/90/180/270
  // branchAssignment: array length 8, each slot either null or color string
  // index = height*2 + side  (side 0 = +X facing, side 1 = -X facing)
  branchAssignment: new Array(8).fill(null)
};

function defaultBranchAssignment(){
  // deterministic default: empty, used purely as a visual starting point
  return new Array(8).fill(null);
}
state.branchAssignment = defaultBranchAssignment();

/* ============================================================
   RANDOMIZATION LOGIC
   ============================================================ */

function randomizeOrientation(){
  const options = [0, 90, 180, 270];
  state.treeAngle = options[Math.floor(Math.random() * options.length)];
  applyTreeAngle();
  updateReadout();
}

function randomizeFruit(){
  // Rule: every height (4 total) must have at least one red or yellow fruit.
  // We have exactly 4 red/yellow fruits (2 yellow, 2 red) and 4 heights, so
  // each height gets exactly one red/yellow. The single green fruit then
  // attaches as a 2nd fruit at one randomly chosen height. Net result:
  // one height has 2 fruits, the other three have 1 fruit each, 3 branches
  // stay empty. Which of the two side-branches at a height gets a fruit
  // is also randomized.

  const redYellow = ['yellow', 'yellow', 'red', 'red'];
  shuffleInPlace(redYellow);

  const next = new Array(8).fill(null);

  // assign one red/yellow to each height, on a randomly chosen side
  for(let h = 0; h < 4; h++){
    const side = Math.random() < 0.5 ? 0 : 1;
    next[h*2 + side] = redYellow[h];
  }

  // pick one height to also receive the green fruit, on its OTHER side
  const greenHeight = Math.floor(Math.random() * 4);
  const occupiedSide = next[greenHeight*2] !== null ? 0 : 1;
  const openSide = occupiedSide === 0 ? 1 : 0;
  next[greenHeight*2 + openSide] = 'green';

  state.branchAssignment = next;
  applyFruitAssignment();
  updateReadout();
}

function shuffleInPlace(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function resetAll(){
  state.treeAngle = 0;
  state.branchAssignment = defaultBranchAssignment();
  applyTreeAngle();
  applyFruitAssignment();
  updateReadout();
}

/* ============================================================
   THREE.JS SCENE SETUP
   ============================================================ */

const host = document.getElementById('canvas-host');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeceadf);
scene.fog = new THREE.Fog(0xeceadf, 9, 22);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(4.2, 4.0, 5.4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
host.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.3, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2.5;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.49;

// lighting
const hemi = new THREE.HemisphereLight(0xffffff, 0xb8b29a, 0.9);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff4e0, 1.15);
sun.position.set(5, 8, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -6;
sun.shadow.camera.right = 6;
sun.shadow.camera.top = 6;
sun.shadow.camera.bottom = -6;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 20;
scene.add(sun);

const fillLight = new THREE.DirectionalLight(0xdce8ff, 0.35);
fillLight.position.set(-4, 3, -3);
scene.add(fillLight);

/* ---------- Mat ---------- */

const matGroup = new THREE.Group();
scene.add(matGroup);

const matTexture = new THREE.TextureLoader().load('map.png');
matTexture.colorSpace = THREE.SRGBColorSpace;
const matMat = new THREE.MeshStandardMaterial({ map: matTexture, roughness: 0.92 });
const matGeo = new THREE.PlaneGeometry(MAT_W, MAT_D);
const matMesh = new THREE.Mesh(matGeo, matMat);
matMesh.rotation.x = -Math.PI / 2;
matMesh.position.set(0, 0, 0);
matMesh.receiveShadow = true;
matGroup.add(matMesh);

// // grid lines
// const lineMat = new THREE.LineBasicMaterial({ color: 0x1a1d1a });
// const gridGeo = new THREE.BufferGeometry();
// const gridPts = [];
// const originX = -MAT_W/2, originZ = -MAT_D/2;
// for(let c = 0; c <= COLS; c++){
//   const x = originX + c*CELL;
//   gridPts.push(x, 0.005, originZ, x, 0.005, originZ + MAT_D);
// }
// for(let r = 0; r <= ROWS; r++){
//   const z = originZ + r*CELL;
//   gridPts.push(originX, 0.005, z, originX + MAT_W, 0.005, z);
// }
// gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridPts, 3));
// const gridLines = new THREE.LineSegments(gridGeo, lineMat);
// matGroup.add(gridLines);

const originX = -MAT_W/2, originZ = -MAT_D/2;
  
// circle markers in each cell
function cellCenter(col, row){
  return {
    x: originX + col*CELL + CELL/2,
    z: originZ + row*CELL + CELL/2
  };
}

// const circleMat = new THREE.LineBasicMaterial({ color: 0x9a9684 });
// for(let col = 0; col < COLS; col++){
//   for(let row = 0; row < ROWS; row++){
//     const { x, z } = cellCenter(col, row);
//     const circleGeo = new THREE.RingGeometry(CELL*0.22, CELL*0.225, 32);
//     circleGeo.rotateX(-Math.PI/2);
//     const ring = new THREE.Mesh(circleGeo, new THREE.MeshBasicMaterial({ color: 0x9a9684 }));
//     ring.position.set(x, 0.006, z);
//     matGroup.add(ring);

//     // crosshair through circle
//     const chGeo = new THREE.BufferGeometry();
//     const r = CELL*0.22;
//     chGeo.setAttribute('position', new THREE.Float32BufferAttribute([
//       x-r, 0.006, z,  x+r, 0.006, z,
//       x, 0.006, z-r,  x, 0.006, z+r
//     ], 3));
//     matGroup.add(new THREE.LineSegments(chGeo, circleMat));
//   }
// }

/* ---------- Tree construction ---------- */

const barkMat = new THREE.MeshStandardMaterial({ color: 0xb08a5a, roughness: 0.75 });
const baseMat = new THREE.MeshStandardMaterial({ color: 0xc9a876, roughness: 0.8 });
const branchMat = new THREE.MeshStandardMaterial({ color: 0x8a6a45, roughness: 0.7 });

const fruitColors = {
  yellow: 0xe8c84a,
  red: 0xc2402f,
  green: 0x2f8f5b
};

const trees = []; // { group, rotPivot, branchSlots: [{mesh holder for fruit}], fruitMeshes: [] }

function buildTree(col, row){
  const { x, z } = cellCenter(col, row);

  const root = new THREE.Group();
  root.position.set(x, 0, z);
  matGroup.add(root);

  // rotation pivot — everything rotates around the tree's own vertical axis
  const pivot = new THREE.Group();
  root.add(pivot);

  // base block
  const baseSize = 0.5;
  const baseHeight = 0.32;
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(baseSize, baseHeight, baseSize),
    baseMat
  );
  base.position.y = baseHeight/2;
  base.castShadow = true;
  base.receiveShadow = true;
  pivot.add(base);

  // dowel
  const dowelHeight = 1.5;
  const dowelRadius = 0.045;
  const dowel = new THREE.Mesh(
    new THREE.CylinderGeometry(dowelRadius, dowelRadius, dowelHeight, 16),
    barkMat
  );
  dowel.position.y = baseHeight + dowelHeight/2;
  dowel.castShadow = true;
  pivot.add(dowel);

  // branches: 4 heights x 2 sides, alternating axis by 90 deg each height
  const branchSlots = [];
  BRANCH_HEIGHTS.forEach((hOffset, hIdx) => {
    const y = baseHeight + hOffset;
    const axisAngle = (hIdx % 2 === 0) ? 0 : Math.PI/2; // alternate X-axis / Z-axis
    [1, -1].forEach((sideSign, sideIdx) => {
      const dx = Math.cos(axisAngle) * sideSign;
      const dz = Math.sin(axisAngle) * sideSign;

      const branch = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, BRANCH_LEN, 10),
        branchMat
      );
      branch.rotation.z = Math.PI/2; // lay cylinder on its side, default along X
      branch.rotation.y = -axisAngle; // rotate around vertical axis to alternate orientation
      branch.position.set(dx * BRANCH_LEN/2, y, dz * BRANCH_LEN/2);
      branch.castShadow = true;
      pivot.add(branch);

      // tip is rotated to face outward along the branch's own axis so the "stem on the left side of the branch, when viewed head-on" reads correctly regardless of which way this height's pair of branches is rotated.
      const tip = new THREE.Group();
      tip.position.set(dx * BRANCH_LEN, y, dz * BRANCH_LEN);
      tip.rotation.y = -axisAngle - (sideSign === 1 ? 0 : Math.PI);
      pivot.add(tip);

      branchSlots.push({
        index: hIdx*2 + sideIdx,
        tip,
        sideSign,
        axisAngle,
        fruitMesh: null
      });
    });
  });

  trees.push({ root, pivot, branchSlots });
}

TREE_CELLS.forEach(c => buildTree(c.col, c.row));

/* ---------- Fruit ---------- */

function makeFruitMesh(color){
  const group = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.085, 16, 16),
    new THREE.MeshStandardMaterial({ color: fruitColors[color], roughness: 0.55 })
  );
  body.castShadow = true;
  // hang slightly below the branch tip, offset to the "left when viewed head-on"
  // long stem hook visual: small cylinder + offset
  body.position.set(0, -0.13, 0.03);
  group.add(body);

  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.012, 0.012, 0.12, 8),
    new THREE.MeshStandardMaterial({ color: 0x5a7a4a, roughness: 0.6 })
  );
  stem.position.set(0, -0.05, 0.01);
  stem.rotation.z = 0.25; // lean left, head-on counterclockwise hook cue
  group.add(stem);

  return group;
}

function applyFruitAssignment(){
  trees.forEach(tree => {
    tree.branchSlots.forEach(slot => {
      if(slot.fruitMesh){
        slot.tip.remove(slot.fruitMesh);
        slot.fruitMesh = null;
      }
      const color = state.branchAssignment[slot.index];
      if(color){
        const mesh = makeFruitMesh(color);
        slot.tip.add(mesh);
        slot.fruitMesh = mesh;
      }
    });
  });
}

function applyTreeAngle(){
  trees.forEach(tree => {
    tree.pivot.rotation.y = THREE.MathUtils.degToRad(state.treeAngle);
  });
}

applyTreeAngle();
applyFruitAssignment();

/* ============================================================
   RESIZE / RENDER LOOP
   ============================================================ */

function resize(){
  const w = host.clientWidth, h = host.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', resize);
resize();

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ============================================================
   UI WIRING
   ============================================================ */

const COLOR_NAME = { yellow: 'Yellow', red: 'Red', green: 'Green', null: '—' };

function updateReadout(){
  document.getElementById('readout-angle').textContent = state.treeAngle + '°';

  const wrap = document.getElementById('branch-readout');
  wrap.innerHTML = '';
  const heightLabels = ['H1 (lowest)', 'H1 (lowest)', 'H2', 'H2', 'H3', 'H3', 'H4 (highest)', 'H4 (highest)'];
  const sideLabels = ['A', 'B'];

  state.branchAssignment.forEach((color, idx) => {
    const heightIdx = Math.floor(idx/2);
    const sideIdx = idx % 2;
    const slot = document.createElement('div');
    slot.className = 'branch-slot';
    const swatch = document.createElement('span');
    swatch.className = 'swatch ' + (color || 'empty');
    slot.appendChild(swatch);
    const label = document.createElement('span');
    label.textContent = `H${heightIdx+1}${sideLabels[sideIdx]} · ${color ? COLOR_NAME[color] : 'empty'}`;
    slot.appendChild(label);
    wrap.appendChild(slot);
  });
}

document.getElementById('btn-orientation').addEventListener('click', randomizeOrientation);
